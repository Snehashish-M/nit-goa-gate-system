name: nit_goa_gate_app
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^2.25.4
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.6
  google_sign_in: ^6.1.5
  qr_flutter: ^4.1.0
  image_picker: ^1.0.7
  provider: ^6.0.5
  intl: ^0.18.1
  cupertino_icons: ^1.0.8
  image_cropper: ^12.1.1
  shared_preferences: ^2.2.2



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/11.png"
  adaptive_icon_background: "#0D1B2A"
  adaptive_icon_foreground: "assets/images/11.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/